name: Tests
on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-slim
    steps:
    - name: Repository checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        persist-credentials: false

    - name: ShellCheck
      run: |
        set -eux
        # Lint the integration tests (the only shell scripts in the repository).
        shellcheck integration/run-integration-tests*
        # Just in case some `.sh` files are added in the future.
        find . -type f -name "*.sh" -exec shellcheck {} +

    - name: Install dependencies
      run: |
        python3 -m venv venv
        . ./venv/bin/activate
        ./venv/bin/pip install --require-virtualenv --upgrade pip tox

    - name: Lint Python files
      run: |
        . ./venv/bin/activate
        tox -e lint

    - name: Typecheck Python files
      run: |
        . ./venv/bin/activate
        tox -e check

  unit-tests:
    name: Unit tests
    runs-on: ubuntu-slim
    steps:
    - name: Repository checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        persist-credentials: false

    - name: Install dependencies
      run: |
        python3 -m venv venv
        . ./venv/bin/activate
        ./venv/bin/pip install --require-virtualenv --upgrade pip tox

    - name: Run unit tests
      run: |
        . ./venv/bin/activate
        tox -e unit

    - name: Coverage
      run: |
        . ./venv/bin/activate
        tox -e coverage

  tests:
    name: Tests
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12", "3.14"]
        track: ["6/edge", "5.21/edge", "5.0/edge"]
        os: ["24.04"]
        include:
          # 4.0/* isn't supported on 24.04
          - python-version: "3.10"
            track: "4.0/edge"
            os: "22.04"

    runs-on: ubuntu-${{ matrix.os }}
    steps:
    - name: Repository checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        persist-credentials: false

    - name: Set up Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      with:
        python-version: ${{ matrix.python-version }}

    - name: Setup LXD
      uses: canonical/setup-lxd@a517a5346a08c624d81953578813a4fc0fe46e0b # main
      with:
        channel: ${{ matrix.track }}

    - name: Install dependencies
      run: |
        set -x
        python3 -m venv venv
        . ./venv/bin/activate
        ./venv/bin/pip install --require-virtualenv --upgrade pip tox

    - name: Integration
      run: |
        . ./venv/bin/activate
        integration/run-integration-tests
