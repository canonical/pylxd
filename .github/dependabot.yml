version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    labels: []
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
    groups:
      actions:
        patterns:
          - "*"

  - package-ecosystem: "pip"
    directory: "/"
    labels: []
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
    groups:
      pip:
        patterns:
          - "*"
